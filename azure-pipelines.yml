# Rebtech CI: verify, build image in ACR, push immutable + latest tags.
# Deploy runs from skill-library-deploy pipeline after image push.

trigger:
  branches:
    include:
      - main
  paths:
    exclude:
      - "**/*.md"
      - docs/**

pr:
  branches:
    include:
      - main

variables:
  azureSubscription: rebtechraidsvc
  acrName: acrskilllibossiandev
  imageRepo: skill-library

pool:
  vmImage: ubuntu-latest

stages:
  - stage: Verify
    displayName: Verify
    jobs:
      - job: verify
        displayName: Build and test
        steps:
          - checkout: self
          - task: NodeTool@0
            inputs:
              versionSpec: 22.x
          - script: |
              set -euo pipefail
              corepack enable
              pnpm install --frozen-lockfile
              pnpm verify
            displayName: pnpm verify

  - stage: Build
    displayName: Build and push image
    dependsOn: Verify
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - job: acr_build
        displayName: ACR build
        steps:
          - checkout: self
          - task: AzureCLI@2
            displayName: Build and push to ACR
            inputs:
              azureSubscription: $(azureSubscription)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                set -euo pipefail
                az acr build \
                  --registry $(acrName) \
                  --image $(imageRepo):$(Build.BuildId) \
                  --image $(imageRepo):latest \
                  --platform linux/amd64 \
                  .
